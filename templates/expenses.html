{% extends "base.html" %}
{% block content %}

<div class="house-selector">
  <form method="post" action="/set-active-house" class="inline">
    <span>🏗️ Casa ativa:</span>
    <select name="house_id" onchange="this.form.submit()">
      {% for h in nav_houses %}
        <option value="{{ h[0] }}" {% if h[0] == active_house_id %}selected{% endif %}>{{ h[1] }}</option>
      {% endfor %}
    </select>
  </form>
</div>

<details>
  <summary>➕ Novo Gasto</summary>
  <form method="post">
  <label>Valor</label>
  <input
    type="number"
    step="0.01"
    name="value"
    placeholder="Ex: 250.00"
    required
    autofocus
  >

  <label>Categoria</label>
  <select name="category_id" required>
    <option value="">-- Selecione --</option>
    {% for c in categories %}
      <option value="{{ c[0] }}">{{ c[1] }}</option>
    {% endfor %}
  </select>

  <label>Data</label>
  <input
    type="date"
    name="date"
    value="{{ today | e }}"
    required
  >

  <label>Observações</label>
  <textarea
    name="observations"
    placeholder="Detalhes adicionais sobre o gasto"
    rows="2"
  ></textarea>

  <button type="submit">💾 Salvar Gasto</button>
</form>
</details>

<h2>Gastos Cadastrados</h2>

<details>
  <summary>🔍 Filtros</summary>
  <form method="get">
    <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap:0.75rem; align-items:end;">
      <div>
        <label>Categoria</label>
        <select name="category_id" style="margin-bottom:0">
          <option value="">Todas</option>
          {% for c in categories %}
            <option value="{{ c[0] }}" {% if filter_category == c[0]|string %}selected{% endif %}>{{ c[1] }}</option>
          {% endfor %}
        </select>
      </div>
      <div>
        <label>De</label>
        <input type="date" name="start_date" value="{{ filter_start }}" style="margin-bottom:0">
      </div>
      <div>
        <label>Até</label>
        <input type="date" name="end_date" value="{{ filter_end }}" style="margin-bottom:0">
      </div>
      <div>
        <button type="submit" style="width:100%; margin:0">🔍 Filtrar</button>
      </div>
      <div>
        <a href="/expenses" class="btn" style="background-color:#6b7280; text-decoration:none; text-align:center; display:block; width:100%; margin:0">Limpar</a>
      </div>
    </div>
  </form>
</details>

<div class="card-list">
    {% for g in expenses %}
      <div class="card">
        <div class="card-header">
          <span class="card-value">{{ g[1]|brl }}</span>
          <div class="card-actions">
            <a href="/edit-expense/{{ g[0] }}">✏️</a>
            <form method="post" action="/remove-expense/{{ g[0] }}" class="inline" onsubmit="return confirm('Tem certeza?')">
              <button type="submit" class="btn-delete">🗑️</button>
            </form>
          </div>
        </div>
        <div class="card-body">
          <span class="tag">{{ g[2] }}</span>
          <span>{{ g[3] }}</span>
          {% if g[5] %}<span>{{ g[5][:50] }}</span>{% endif %}
        </div>
      </div>
    {% endfor %}
  </div>

{% endblock %}
