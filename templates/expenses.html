{% extends "base.html" %}
{% block content %}

<h2>Novo Gasto</h2>

<form method="post">
  <label>Valor</label>
  <input
    type="number"
    step="0.01"
    name="value"
    placeholder="Ex: 250.00"
    required
    autofocus
  >

  <label>Categoria</label>
  <select name="category_id" required>
    <option value="">-- Selecione --</option>
    {% for c in categories %}
      <option value="{{ c[0] }}">{{ c[1] }}</option>
    {% endfor %}
  </select>

  <label>Data</label>
  <input
    type="date"
    name="date"
    value="{{ today | e }}"
    required
  >

  <label>Casa</label>
  <select name="house_id" required>
    <option value="">-- Selecione a casa --</option>
    {% for house in houses %}
      <option value="{{ house[0] }}">{{ house[1] }}</option>
    {% endfor %}
  </select>

  <label>Observações</label>
  <textarea
    name="observations"
    placeholder="Detalhes adicionais sobre o gasto"
    rows="4"
  ></textarea>

  <button type="submit">💾 Salvar Gasto</button>
</form>

<h2>Gastos Cadastrados</h2>

<details>
  <summary style="cursor:pointer; font-weight:600; font-size:1.1rem; margin-bottom:0.75rem;">🔍 Filtros</summary>
  <form method="get">
    <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap:0.75rem; align-items:end;">
      <div>
        <label>Casa</label>
        <select name="house_id" style="margin-bottom:0">
          <option value="">Todas</option>
          {% for house in houses %}
            <option value="{{ house[0] }}" {% if filter_house == house[0]|string %}selected{% endif %}>{{ house[1] }}</option>
          {% endfor %}
        </select>
      </div>
      <div>
        <label>Categoria</label>
        <select name="category_id" style="margin-bottom:0">
          <option value="">Todas</option>
          {% for c in categories %}
            <option value="{{ c[0] }}" {% if filter_category == c[0]|string %}selected{% endif %}>{{ c[1] }}</option>
          {% endfor %}
        </select>
      </div>
      <div>
        <label>De</label>
        <input type="date" name="start_date" value="{{ filter_start }}" style="margin-bottom:0">
      </div>
      <div>
        <label>Até</label>
        <input type="date" name="end_date" value="{{ filter_end }}" style="margin-bottom:0">
      </div>
      <div>
        <button type="submit" style="width:100%; margin:0">🔍 Filtrar</button>
      </div>
      <div>
        <a href="/expenses" class="btn" style="background-color:#6b7280; text-decoration:none; text-align:center; display:block; width:100%; margin:0">Limpar</a>
      </div>
    </div>
  </form>
</details>

<table>
  <thead>
    <tr>
      <th>Valor</th>
      <th>Categoria</th>
      <th>Casa</th>
      <th>Data</th>
      <th>Observações</th>
      <th>Ações</th>
    </tr>
  </thead>
  <tbody>
    {% for g in expenses %}
      <tr>
        <td><strong>{{ g[1]|brl }}</strong></td>
        <td>{{ g[2] }}</td>
        <td>{{ g[4] }}</td>
        <td>{{ g[3] }}</td>
        <td>{{ g[5][:50] if g[5] else '-' }}</td>
        <td>
          <a href="/edit-expense/{{ g[0] }}">✏️</a>
          <form method="post" action="/remove-expense/{{ g[0] }}" class="inline" onsubmit="return confirm('Tem certeza?')">
            <button type="submit" class="btn-delete">🗑️</button>
          </form>
        </td>
      </tr>
    {% endfor %}
  </tbody>
</table>

{% endblock %}
