{% extends "base.html" %}
{% block content %}

<details>
  <summary style="cursor:pointer; font-weight:600; font-size:1.1rem; margin-bottom:0.75rem;">➕ Nova Categoria</summary>
  <form method="post" action="/new-category">
      <label>Nome da Categoria</label>
      <input name="name" type="text" placeholder="Ex: Material de Construção" required autofocus>
      <button type="submit">💾 Salvar Categoria</button>
  </form>
</details>

<h2>Categorias Cadastradas</h2>

<table>
  <thead>
    <tr>
      <th>Nome</th>
      <th>Ações</th>
    </tr>
  </thead>
  <tbody>
    {% for c in categories %}
      <tr>
        <td><strong>{{ c[1] }}</strong></td>
        <td>
          <a href="/edit-category/{{ c[0] }}">✏️</a>
          <form method="post" action="/remove-category/{{ c[0] }}" class="inline" onsubmit="return confirm('Tem certeza?')">
            <button type="submit" class="btn-delete">🗑️</button>
          </form>
        </td>
      </tr>
    {% endfor %}
  </tbody>
</table>

{% endblock %}
