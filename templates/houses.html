{% extends "base.html" %}
{% block content %}

<h2>Nova Casa</h2>

<form method="post" action="/new-house">
  <label>Nome da Casa</label>
  <input name="name" placeholder="Ex: Casa Principal" required autofocus>

  <label>Preço de Venda</label>
  <input type="number" step="0.01" name="selling_price" placeholder="R$ 0,00">

  <label>Observações</label>
  <textarea name="observations" rows="3" placeholder="Observações adicionais..."></textarea>

  <button type="submit">💾 Salvar Casa</button>
</form>

<h2>Casas Cadastradas</h2>

<table>
  <thead>
    <tr>
      <th>Nome</th>
      <th>Preço de Venda</th>
      <th>Total Gasto</th>
      <th>Observações</th>
      <th>Ações</th>
    </tr>
  </thead>
  <tbody>
    {% for house in houses %}
      <tr>
        <td><strong>{{ house[1] }}</strong></td>
        <td>{{ house[2]|brl if house[2] else '-' }}</td>
        <td><strong>{{ house[4]|brl }}</strong></td>
        <td>{{ house[3][:50] if house[3] else '-' }}</td>
        <td>
          <a href="/edit-house/{{ house[0] }}">✏️</a>
          <form method="post" action="/remove-house/{{ house[0] }}" style="display:inline" onsubmit="return confirm('Tem certeza?')">
            <button type="submit" style="background:none;border:none;cursor:pointer;font-size:1.25rem;padding:0;margin:0 0.25rem">🗑️</button>
          </form>
        </td>
      </tr>
    {% endfor %}
  </tbody>
</table>

{% endblock %}
