{% extends "base.html" %}
{% block content %}

<h2>Nova Categoria</h2>

<form method="post" action="/new-category">
    <label>Nome da Categoria</label>
    <input name="name" type="text" placeholder="Ex: Material de Construção" required autofocus>
    <button type="submit">💾 Salvar Categoria</button>
</form>

<h2>Categorias Cadastradas</h2>

<table>
  <thead>
    <tr>
      <th>Nome</th>
      <th>Ações</th>
    </tr>
  </thead>
  <tbody>
    {% for c in categories %}
      <tr>
        <td><strong>{{ c[1] }}</strong></td>
        <td>
          <a href="/edit-category/{{ c[0] }}">✏️</a>
          <form method="post" action="/remove-category/{{ c[0] }}" style="display:inline" onsubmit="return confirm('Tem certeza?')">
            <button type="submit" style="background:none;border:none;cursor:pointer;font-size:1.25rem;padding:0;margin:0 0.25rem">🗑️</button>
          </form>
        </td>
      </tr>
    {% endfor %}
  </tbody>
</table>

{% endblock %}
