{% extends "base.html" %}
{% block content %}

<details>
  <summary>➕ Nova Casa</summary>
  <form method="post" action="/new-house">
    <label>Nome da Casa</label>
    <input name="name" placeholder="Ex: Casa Principal" required autofocus>

    <label>Preço de Venda</label>
    <input type="number" step="0.01" name="selling_price" placeholder="R$ 0,00">

    <label>Observações</label>
    <textarea name="observations" rows="2" placeholder="Observações adicionais..."></textarea>

    <button type="submit">💾 Salvar Casa</button>
  </form>
</details>

<h2>Casas Cadastradas</h2>

<div class="card-list">
  {% for house in houses %}
    <div class="card">
      <div class="card-header">
        <strong>{{ house[1] }}</strong>
        <div class="card-actions">
          <a href="/edit-house/{{ house[0] }}">✏️</a>
          <form method="post" action="/remove-house/{{ house[0] }}" class="inline" onsubmit="return confirm('Tem certeza?')">
            <button type="submit" class="btn-delete">🗑️</button>
          </form>
        </div>
      </div>
      <div class="card-body" style="flex-direction:column; gap:0.4rem;">
        <span>Preço de venda: <strong>{{ house[2]|brl if house[2] else '-' }}</strong></span>
        <span>Total gasto: <strong>{{ house[4]|brl }}</strong></span>
        {% if house[3] %}<span>{{ house[3][:80] }}</span>{% endif %}
      </div>
    </div>
  {% endfor %}
</div>

{% endblock %}
