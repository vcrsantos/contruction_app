<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#6366f1">
  <title>Construção - Gerenciador de Despesas</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<nav>
  <a href="/houses">🏠 Casas</a>
  <a href="/expenses">💰 Gastos</a>
  <a href="/categories">📂 Categorias</a>
</nav>

<div class="house-selector">
  <form method="post" action="/set-active-house" class="inline">
    <span>🏗️ Casa ativa:</span>
    <select name="house_id" onchange="this.form.submit()">
      {% for h in nav_houses %}
        <option value="{{ h[0] }}" {% if h[0] == active_house_id %}selected{% endif %}>{{ h[1] }}</option>
      {% endfor %}
    </select>
  </form>
</div>

<div class="container">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
      <div class="{{ category }}">{{ message }}</div>
    {% endfor %}
  {% endwith %}
  {% block content %}{% endblock %}
</div>

</body>
</html>
